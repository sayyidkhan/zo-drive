<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f4f8ff" />
    <meta
      name="description"
      content="A Zo Drive particle study exploring calm, distributed machine clusters."
    />
    <title>Zo Drive — Distributed Clusters</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="lab">
      <canvas class="particle-canvas" aria-hidden="true"></canvas>

      <header class="lab-header">
        <a class="brand" href="#" aria-label="Zo Drive particle study">
          <span class="brand-mark">z</span>
          <span>Zo Drive</span>
        </a>
        <p class="study-label">03 / Distributed Clusters</p>
        <p class="interaction-hint"><span></span> Move to nudge a machine</p>
      </header>

      <section class="lab-copy" aria-labelledby="lab-title">
        <p class="eyebrow"><span></span>Independent by design</p>
        <h1 id="lab-title">Many machines.<br /><em>One calm system.</em></h1>
        <p>
          Each island keeps its own shape. Only the packets that need to move
          cross the space between them.
        </p>
      </section>

      <footer class="lab-footer">
        <span>Four independent machines</span>
        <span>Private routes · visible movement</span>
      </footer>
    </main>

    <script src="./particle.js"></script>
  </body>
</html>
